name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          git checkout main -- playground/dota-analytics.html
          cp playground/dota-analytics.html index.html
          git add index.html
          git commit -m "deploy: update dashboard from main $(git rev-parse --short main)"
          git push origin gh-pages-tmp:gh-pages --force
